name: Build and push storefront image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: savingswsaacr
  IMAGE_NAME: aroma-deoghar

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Sign in to Azure with OpenID Connect
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ACR_NAME.azurecr.io/$IMAGE_NAME"
          docker build --tag "$IMAGE:$IMAGE_TAG" --tag "$IMAGE:latest" .
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"
          echo "Pushed $IMAGE:$IMAGE_TAG"

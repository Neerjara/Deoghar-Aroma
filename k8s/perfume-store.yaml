apiVersion: apps/v1
kind: Deployment
metadata:
  name: aroma-deoghar
  namespace: storefront
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aroma-deoghar
  template:
    metadata:
      labels:
        app: aroma-deoghar
    spec:
      containers:
        - name: storefront
          image: savingswsaacr.azurecr.io/aroma-deoghar:1.0.0
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aroma-deoghar
  namespace: storefront
spec:
  selector:
    app: aroma-deoghar
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer